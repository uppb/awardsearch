name: Alaska Alerts Worker Runtime Note
on:
  workflow_dispatch:

concurrency:
  group: "alaska-alerts-worker"
  cancel-in-progress: true

jobs:
  runtime-note:
    name: runtime-note
    runs-on: ubuntu-latest
    steps:
    steps:
      - name: Print runtime boundary
        run: |
          cat <<'EOF'
          The SQLite-backed award-alert service is not intended to run in GitHub Actions.

          Current production model:
          - run `awardwiz/workers/award-alerts-evaluator.ts` on one persistent server
          - run `awardwiz/workers/award-alerts-notifier.ts` on the same server
          - keep `DATABASE_PATH` on persistent disk
          - provide `DISCORD_WEBHOOK_URL` and optional Discord overrides there

          This workflow exists only as an explicit note so the repository does not imply
          that GitHub-hosted cron, Firestore, or Firebase credentials are the worker runtime.
          EOF
